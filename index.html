<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Murdock Shapefile Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

    #panel {
      position: absolute; top: 16px; left: 16px;
      z-index: 1000;
      background: rgba(255,255,255,0.97);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.28);
      padding: 16px;
      width: 290px;
    }
    #panel h2 {
      font-size: 13px; font-weight: 700; color: #1a1a2e;
      margin-bottom: 12px; letter-spacing: 0.3px;
    }

    /* Search */
    #search-wrap { position: relative; margin-bottom: 12px; }
    #searchbox {
      width: 100%; padding: 8px 12px;
      border: 1.5px solid #ddd; border-radius: 7px;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    #searchbox:focus { border-color: #4a90d9; }
    #suggestions {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border: 1.5px solid #ddd;
      border-top: none; border-radius: 0 0 7px 7px;
      max-height: 200px; overflow-y: auto; z-index: 2000; display: none;
    }
    .suggestion { padding: 7px 12px; font-size: 12.5px; cursor: pointer; color: #333; }
    .suggestion:hover, .suggestion.active { background: #4a90d9; color: white; }
    .suggestion mark { background: transparent; font-weight: 700; color: inherit; }

    /* Toggle */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-top: 1px solid #eee; margin-top: 4px;
    }
    .toggle-label { font-size: 12.5px; font-weight: 600; color: #333; }
    .toggle-sub   { font-size: 11px; color: #888; margin-top: 2px; }
    .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #ccc;
      border-radius: 24px; cursor: pointer; transition: 0.3s;
    }
    .slider:before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: 0.3s;
    }
    input:checked + .slider { background: #4a90d9; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Result info */
    #result-info { margin-top: 10px; font-size: 12px; color: #666; min-height: 16px; }
    #result-info b { color: #1a1a2e; }
    #clear-btn {
      margin-top: 8px; width: 100%; padding: 6px;
      background: #f0f0f0; border: none; border-radius: 6px;
      font-size: 12px; cursor: pointer; color: #555; display: none;
    }
    #clear-btn:hover { background: #e0e0e0; }

    /* Legend */
    #legend {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;
      display: none;
    }
    #legend .leg-title { font-size: 11px; font-weight: 700; color: #555; margin-bottom: 6px; }
    .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .leg-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .leg-text { font-size: 11.5px; color: #444; }
    .leg-arrow-bidir { font-size: 13px; }

    #coords {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(26,26,46,0.80); color: #fff;
      padding: 5px 16px; border-radius: 20px; font-size: 12px;
      font-family: monospace; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>🗺 Murdock Shapefile Explorer</h2>

  <div id="search-wrap">
    <input id="searchbox" type="text" placeholder="Search group name…" autocomplete="off"/>
    <div id="suggestions"></div>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Joking Relationships</div>
      <div class="toggle-sub">Highlight pairs &amp; arrows</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="joking-toggle"/>
      <span class="slider"></span>
    </label>
  </div>

  <div id="legend">
    <div class="leg-title">Regions</div>
    <div class="leg-row"><div class="leg-swatch" style="background:#E07B39"></div><span class="leg-text">Western Africa</span></div>
    <div class="leg-row"><div class="leg-swatch" style="background:#4C9BE8"></div><span class="leg-text">Eastern Africa</span></div>
    <div class="leg-row"><div class="leg-swatch" style="background:#9B59B6"></div><span class="leg-text">Central Africa</span></div>
    <div class="leg-row"><div class="leg-swatch" style="background:#27AE60"></div><span class="leg-text">Northern Africa</span></div>
    <div class="leg-row"><div class="leg-swatch" style="background:#E74C3C"></div><span class="leg-text">Southern Africa</span></div>
    <div style="height:6px"></div>
    <div class="leg-row"><span style="font-size:15px">↔</span><span class="leg-text">Bidirectional</span></div>
    <div class="leg-row"><span style="font-size:15px">→</span><span class="leg-text">Unidirectional</span></div>
    <div class="leg-row">
      <div class="leg-swatch" style="background:#888;border-radius:50%"></div>
      <span class="leg-text">Joshua Project point</span>
    </div>
  </div>

  <div id="result-info">844 ethnic groups — hover to explore</div>
  <button id="clear-btn" onclick="clearHighlight()">✕ Clear highlight</button>
</div>
<div id="coords">Lat: — &nbsp;|&nbsp; Lon: —</div>

let highlightedLayer = null;
let allLayers = {};
let jokingActive = false;
let arrowLayers  = [];
let pointMarkers = [];

function defaultStyle(color)    { return { fillColor:color, color:'#666', weight:0.5, fillOpacity:0.6 }; }
function highlightStyle(color)  { return { fillColor:color, color:'#ff4757', weight:3, fillOpacity:0.92 }; }
function jokingStyle(color)     { return { fillColor:color, color:'white', weight:1.5, fillOpacity:0.82 }; }
function dimmedStyle()          { return { fillColor:'#ccc', color:'#bbb', weight:0.3, fillOpacity:0.25 }; }

const geoLayer = L.geoJSON(GEOJSON, {
  style: f => defaultStyle(f.properties.color),
  onEachFeature: (f, layer) => {
    const p = f.properties;
    allLayers[p.NAME] = layer;
    layer.bindTooltip(
      `<b>${p.NAME}</b><br><span style="color:#888;font-size:11px">Centroid: ${p.LAT?.toFixed(4)}, ${p.LON?.toFixed(4)}</span>`,
      {sticky:true, opacity:0.95}
    );
    layer.on('mouseover', () => { if (layer !== highlightedLayer && !jokingActive) layer.setStyle({fillOpacity:0.88, weight:1.5}); });
    layer.on('mouseout',  () => { if (layer !== highlightedLayer && !jokingActive) layer.setStyle(defaultStyle(p.color)); });
    layer.on('click', () => selectGroup(p.NAME));
  }
}).addTo(map);

function selectGroup(name) {
  const layer = allLayers[name];
  if (!layer) return;
  if (highlightedLayer && highlightedLayer !== layer) {
    restoreLayer(highlightedLayer);
  }
  highlightedLayer = layer;
  const p = layer.feature.properties;
  layer.setStyle(highlightStyle(p.color));
  layer.bringToFront();
  map.fitBounds(layer.getBounds(), {maxZoom:7, padding:[40,40]});
  document.getElementById('result-info').innerHTML =
    `<b>${p.NAME}</b> — Centroid: ${p.LAT?.toFixed(4)}, ${p.LON?.toFixed(4)}`;
  document.getElementById('clear-btn').style.display = 'block';
  document.getElementById('searchbox').value = name;
  closeSuggestions();
}

function restoreLayer(layer) {
  if (!layer) return;
  const p = layer.feature.properties;
  if (jokingActive && JOKING_MURDOCK[p.NAME]) {
    layer.setStyle(jokingStyle(JOKING_MURDOCK[p.NAME].color));
  } else if (jokingActive) {
    layer.setStyle(dimmedStyle());
  } else {
    layer.setStyle(defaultStyle(p.color));
  }
}

function clearHighlight() {
  if (highlightedLayer) { restoreLayer(highlightedLayer); highlightedLayer = null; }
  document.getElementById('result-info').innerHTML = jokingActive
    ? `${Object.keys(JOKING_MURDOCK).length} joking groups highlighted`
    : '844 ethnic groups — hover to explore';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('searchbox').value = '';
}

function drawArrow(a) {
  const pts = [[a.lat_a, a.lon_a], [a.lat_b, a.lon_b]];

  // Curved line using via-point offset
  const midLat = (a.lat_a + a.lat_b) / 2;
  const midLon = (a.lon_a + a.lon_b) / 2;
  const dLat   = a.lat_b - a.lat_a;
  const dLon   = a.lon_b - a.lon_a;
  const curve  = 0.12;
  const viaLat = midLat - dLon * curve;
  const viaLon = midLon + dLat * curve;

  const line = L.polyline([[a.lat_a, a.lon_a],[viaLat, viaLon],[a.lat_b, a.lon_b]], {
    color: '#1a1a2e', weight: 1.8, opacity: 0.85, smoothFactor: 1
  });

  // Arrow head(s) as small circle markers at endpoints
  const tipB = L.circleMarker([a.lat_b, a.lon_b], {
    radius:4, color:'#1a1a2e', fillColor:'#1a1a2e', fillOpacity:1, weight:1
  });
  const tipA = a.bidir ? L.circleMarker([a.lat_a, a.lon_a], {
    radius:4, color:'#1a1a2e', fillColor:'#1a1a2e', fillOpacity:1, weight:1
  }) : null;

  const label = a.bidir
    ? `<b>${a.entity_a}</b> ↔ <b>${a.entity_b}</b>`
    : `<b>${a.entity_a}</b> → <b>${a.entity_b}</b>`;
  line.bindTooltip(label, {sticky:true, opacity:0.95});

  line.addTo(map);
  tipB.addTo(map);
  arrowLayers.push(line, tipB);
  if (tipA) { tipA.addTo(map); arrowLayers.push(tipA); }
}

function enableJoking() {
  jokingActive = true;
  document.getElementById('legend').style.display = 'block';

  // Restyle all polygons
  geoLayer.eachLayer(layer => {
    const name = layer.feature.properties.NAME;
    if (highlightedLayer === layer) return;
    if (JOKING_MURDOCK[name]) {
      layer.setStyle(jokingStyle(JOKING_MURDOCK[name].color));
      layer.bringToFront();
    } else {
      layer.setStyle(dimmedStyle());
    }
  });

  // Joshua Project point markers
  JOKING_POINTS.forEach(p => {
    const m = L.circleMarker([p.lat, p.lon], {
      radius:7, fillColor:p.color, color:'white',
      weight:2, fillOpacity:0.9
    }).bindTooltip(`<b>${p.name}</b><br><span style="color:#888;font-size:11px">Joshua Project · ${p.lat.toFixed(4)}, ${p.lon.toFixed(4)}</span>`, {sticky:true});
    m.addTo(map);
    pointMarkers.push(m);
  });

  // Arrows
  ARROWS.forEach(drawArrow);

  document.getElementById('result-info').innerHTML =
    `${Object.keys(JOKING_MURDOCK).length} joking groups highlighted &nbsp;·&nbsp; ${ARROWS.length} connections`;
}

function disableJoking() {
  jokingActive = false;
  document.getElementById('legend').style.display = 'none';

  // Restore all polygons
  geoLayer.eachLayer(layer => {
    const p = layer.feature.properties;
    if (highlightedLayer === layer) return;
    layer.setStyle(defaultStyle(p.color));
  });

  // Remove arrows + points
  arrowLayers.forEach(l => map.removeLayer(l));
  arrowLayers = [];
  pointMarkers.forEach(l => map.removeLayer(l));
  pointMarkers = [];

  document.getElementById('result-info').innerHTML = '844 ethnic groups — hover to explore';
  document.getElementById('legend').style.display = 'none';
}

document.getElementById('joking-toggle').addEventListener('change', e => {
  if (e.target.checked) enableJoking(); else disableJoking();
});

// ── Search ───────────────────────────────────────────────────────────────────
const searchbox = document.getElementById('searchbox');
const suggestionsEl = document.getElementById('suggestions');
let activeIdx = -1;

searchbox.addEventListener('input', () => {
  const q = searchbox.value.trim().toUpperCase();
  if (!q) { closeSuggestions(); return; }
  const matches = ALL_NAMES.filter(n => n.includes(q)).slice(0, 30);
  if (!matches.length) { closeSuggestions(); return; }
  suggestionsEl.innerHTML = matches.map(n => {
    const hi = n.replace(new RegExp(`(${q})`, 'g'), '<mark>$1</mark>');
    return `<div class="suggestion" onclick="selectGroup('${n}')">${hi}</div>`;
  }).join('');
  suggestionsEl.style.display = 'block';
  activeIdx = -1;
});

searchbox.addEventListener('keydown', e => {
  const items = suggestionsEl.querySelectorAll('.suggestion');
  if      (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx+1, items.length-1); hlSug(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp')   { activeIdx = Math.max(activeIdx-1, 0);              hlSug(items); e.preventDefault(); }
  else if (e.key === 'Enter')  { if (activeIdx>=0) items[activeIdx].click(); else if (items.length===1) items[0].click(); }
  else if (e.key === 'Escape') closeSuggestions();
});

function hlSug(items) {
  items.forEach((el,i) => el.classList.toggle('active', i===activeIdx));
  if (activeIdx >= 0) items[activeIdx].scrollIntoView({block:'nearest'});
}
function closeSuggestions() { suggestionsEl.style.display = 'none'; activeIdx = -1; }
document.addEventListener('click', e => { if (!e.target.closest('#panel')) closeSuggestions(); });
</script>
